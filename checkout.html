<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الدفع</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
<div class="logo">
SOJI MOON
<span>HIDDEN ELEGANCE</span>
</div>
</nav>

<section class="page-section">
<h1 class="section-title">تأكيد الطلب والدفع</h1>

<form class="checkout-form" action="https://formspree.io/f/xvzypaod" method="POST">

<input type="text" name="name" placeholder="الاسم الكامل" required>

<input type="email" name="email" placeholder="البريد الإلكتروني" required>

<input type="tel" name="phone" placeholder="رقم الهاتف" required>

<textarea name="address" placeholder="العنوان الكامل"></textarea>

<select name="payment">
<option>فوري السودان</option>
<option>تحويل بنكي</option>
<option>الدفع عند الاستلام</option>
</select>

<button type="submit">
تأكيد الطلب
</button>

</form>
</section>

<footer>
<p>جميع الحقوق محفوظة © SOJI MOON 2026</p>
</footer>

</body>
</html>
